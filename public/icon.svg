<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Wallet body -->
  <rect x="15" y="29" width="70" height="45" rx="9" fill="white"/>

  <!-- Wallet flap / opening line -->
  <rect x="15" y="46" width="70" height="3.5" rx="1.75" fill="#ccfbf1"/>

  <!-- Coin slot (teal on white) -->
  <rect x="55" y="36" width="23" height="31" rx="6" fill="#0d9488"/>

  <!-- Coin outline inside slot -->
  <circle cx="66.5" cy="51.5" r="5.5" fill="none" stroke="white" stroke-width="1.8" opacity="0.55"/>
</svg>
