# Runs on every push to `main` (including when a PR is merged).
# Configure repository secrets (and optional variables) — see README "Production deployment (GitHub Actions)".

name: Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  deploy-convex:
    name: Deploy Convex (production)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push Convex functions
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy --yes --typecheck try

  deploy-vercel:
    name: Deploy Vercel (production)
    needs: deploy-convex
    if: vars.DEPLOY_VERCEL == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pulls production env (NEXT_PUBLIC_*, CLERK_*, etc.) from the Vercel project.
      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  e2e:
    name: E2E Tests (post-deploy)
    # Run after Convex is live; if Vercel is also deploying, wait for that too.
    needs: [deploy-convex, deploy-vercel]
    # deploy-vercel is conditional — always run e2e once Convex is deployed.
    if: always() && needs.deploy-convex.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Next.js compiles NEXT_PUBLIC_* values from .env files rather than
      # inheriting process.env. Copy the committed public values into .env.local
      # so the dev server starts correctly, then add the secret key too.
      - name: Write .env.local for Next.js dev server
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          if [ -z "$CLERK_SECRET_KEY" ]; then
            echo "ERROR: CLERK_SECRET_KEY secret is not set or is empty."
            echo "Add it as a repository-level secret under Settings → Secrets and variables → Actions."
            exit 1
          fi
          grep '^NEXT_PUBLIC_' .env.test >> .env.local
          echo "CLERK_SECRET_KEY=${CLERK_SECRET_KEY}" >> .env.local

      - name: Run E2E tests
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 7
