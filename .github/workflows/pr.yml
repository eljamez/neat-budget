# Runs on every pull request targeting main.
# Lint + E2E tests run against the production Convex deployment, so they
# validate frontend/flow changes. PRs that include breaking Convex schema
# changes should be merged carefully (Convex deploy happens on main merge).
#
# Required repository Secrets (Settings → Secrets and variables → Actions → Secrets):
#   CLERK_SECRET_KEY       — Clerk secret key
#   E2E_TEST_USER_EMAIL    — email of the dedicated Clerk test user
#   E2E_TEST_USER_PASSWORD — password of the dedicated Clerk test user
#
# Public config (Convex URL, Clerk publishable key, redirect URLs) is committed
# in .env.test — no repository variables needed.

name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Next.js compiles NEXT_PUBLIC_* values from .env files rather than
      # inheriting process.env. Copy the committed public values into .env.local
      # so the dev server starts correctly, then add the secret key too.
      - name: Write .env.local for Next.js dev server
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          if [ -z "$CLERK_SECRET_KEY" ]; then
            echo "ERROR: CLERK_SECRET_KEY secret is not set or is empty."
            echo "Add it as a repository-level secret under Settings → Secrets and variables → Actions."
            exit 1
          fi
          grep '^NEXT_PUBLIC_' .env.test >> .env.local
          echo "CLERK_SECRET_KEY=${CLERK_SECRET_KEY}" >> .env.local

      - name: Run E2E tests
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 7
